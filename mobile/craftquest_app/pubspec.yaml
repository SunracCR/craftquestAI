name: craftquest_app
description: CraftQuest mobile app
publish_to: 'none'
version: 1.0.2+5

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  dio: ^5.8.0+1
  intl: 0.20.2
  equatable: ^2.0.7
  flutter_secure_storage: ^10.2.0
  image_picker: ^1.1.2
  in_app_purchase: ^3.2.3
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4
  file_picker: ^8.1.7
  desktop_drop: ^0.5.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  app_links: ^6.4.0
  cross_file: ^0.3.4+2
  google_sign_in: ^6.3.0
  google_sign_in_web: ^0.12.4
  sign_in_with_apple: ^6.1.4
  flutter_svg: ^2.0.17
  audioplayers: ^6.4.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.0.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/auth/
    - assets/images/brand/
    - assets/icons/oauth/
    - assets/audio/sfx/
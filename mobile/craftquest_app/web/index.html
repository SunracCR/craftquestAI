<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- GIS needs the page origin sent to accounts.google.com (not blocked by same-origin). -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="CraftQuestAI — práctica y cuestionarios con IA.">
  <!-- Google Sign-In (Flutter web): mismo Web Client ID que ExternalAuth:Google:WebClientId -->
  <meta name="google-signin-client_id" content="398143602966-d4urqebho1niu1qt7lgmqgvc2gn52c35.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CraftQuestAI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon (tamaños pequeños; Chrome no usa bien PNG de ~1 MB) -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=2"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=2"/>
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>CraftQuestAI</title>
  <link rel="manifest" href="manifest.json">
  <!-- Sign in with Apple (Flutter web) -->
  <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
</head>

  <script src="flutter_bootstrap.js" async></script>
